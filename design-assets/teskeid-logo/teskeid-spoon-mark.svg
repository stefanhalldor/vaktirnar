<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Teskeid spoon mark</title>
  <desc id="desc">A minimal deep green spoon outline with Allt i in the raised handle and Teskeid.is inside the bowl, on a warm cream rounded square.</desc>

  <rect width="400" height="400" rx="72" fill="#fbf9f4"/>

  <g transform="rotate(7 200 200)">
    <path
      d="
        M 64 191
        C 91 184, 138 185, 181 188
        C 205 147, 257 130, 308 143
        C 354 155, 365 199, 337 231
        C 306 266, 242 269, 200 238
        C 156 242, 106 240, 64 233
        C 42 229, 42 197, 64 191
        Z
      "
      fill="none"
      stroke="#154212"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <text
      x="126"
      y="216"
      fill="#154212"
      font-family="Inter, Geist, Arial, sans-serif"
      font-size="16"
      font-weight="700"
      text-anchor="middle"
      dominant-baseline="middle"
    >Allt &#237;</text>
  </g>

  <text
    x="261"
    y="211"
    fill="#154212"
    font-family="Inter, Geist, Arial, sans-serif"
    font-size="32"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="middle"
  >Teskei&#240;.is</text>
</svg>
