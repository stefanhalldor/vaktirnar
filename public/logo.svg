<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!--
    Teskeið logo — same spoon as mark, plus "Teskeið" text in the bowl.
    Bowl center (260,200), text centered around x=272 y=200.
  -->

  <rect width="400" height="400" rx="72" fill="#fbf9f4"/>

  <path
    d="
      M 196,166
      A 80,56 0 1 1 196,234
      C 170,236 110,230 70,224
      A 24,24 0 1 0 70,176
      C 110,170 170,164 196,166
      Z
    "
    fill="none"
    stroke="#154212"
    stroke-width="14"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <text
    x="272"
    y="200"
    font-family="Geist, Inter, system-ui, -apple-system, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="-0.02em"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#154212"
  >Teskeið</text>
</svg>
