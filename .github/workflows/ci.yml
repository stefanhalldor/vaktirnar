name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy-vapid-public-key
          VAPID_PRIVATE_KEY: dummy-vapid-private-key
          VAPID_SUBJECT: mailto:ci@example.com
          CRON_SECRET: dummy-cron-secret

      - name: Type check
        run: npm run type-check
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy-vapid-public-key
          VAPID_PRIVATE_KEY: dummy-vapid-private-key
          VAPID_SUBJECT: mailto:ci@example.com
          CRON_SECRET: dummy-cron-secret

      - name: Run tests
        run: npm run test:run
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy-vapid-public-key
          VAPID_PRIVATE_KEY: dummy-vapid-private-key
          VAPID_SUBJECT: mailto:ci@example.com
          CRON_SECRET: dummy-cron-secret
